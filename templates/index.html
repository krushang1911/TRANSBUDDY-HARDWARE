<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TransBuddy Bus Verification</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial}

body{
  background:#0f172a;
  color:#e2e8f0;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}

header{
  width:100%;
  padding:20px;
  background:linear-gradient(90deg,#1e293b,#0f172a);
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 3px 10px rgba(0,0,0,0.4);
}

header h1{
  color:#38bdf8;
  font-size:20px;
}

#clock{
  font-size:14px;
  color:#94a3b8;
}

main{
  margin-top:30px;
  width:100%;
  max-width:1000px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
  padding:20px;
}

@media(max-width:800px){
  main{grid-template-columns:1fr;}
}

.card{
  background:#1e293b;
  padding:25px;
  border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
}

.card-title{
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:2px;
  color:#64748b;
  margin-bottom:15px;
}

#camera{
  width:100%;
  border-radius:10px;
  border:4px solid #334155;
  transition:0.4s;
}

#camera.valid{border-color:#22c55e;}
#camera.fee_unpaid{border-color:#f59e0b;}
#camera.invalid_person{border-color:#ef4444;}

#status{
  margin-top:15px;
  padding:12px;
  text-align:center;
  border-radius:50px;
  font-weight:bold;
  letter-spacing:1px;
}

#status.valid{background:#22c55e;color:white;}
#status.fee_unpaid{background:#f59e0b;color:white;}
#status.invalid_person{background:#ef4444;color:white;}
#status.invalid_database{background:#a855f7;color:white;}
#status.error{background:#dc2626;color:white;}
#status.waiting{background:#334155;color:#cbd5e1;}

.row{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid #334155;
}

.label{color:#64748b;font-size:13px;}
.value{font-weight:600;}

.history{
  max-height:200px;
  overflow-y:auto;
  font-size:13px;
}

.history div{
  padding:6px 0;
  border-bottom:1px solid #334155;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  display:inline-block;
  margin-right:6px;
}

.dot.valid{background:#22c55e;}
.dot.fee_unpaid{background:#f59e0b;}
.dot.invalid_person{background:#ef4444;}
.dot.invalid_database{background:#a855f7;}
.dot.error{background:#dc2626;}
</style>
</head>

<body>

<header>
  <h1>🚌 TransBuddy Bus Verification System</h1>
  <div id="clock"></div>
</header>

<main>

<!-- Camera -->
<div class="card">
  <div class="card-title">Live Camera Feed</div>
  <img id="camera" src="/static/latest.jpg">
  <div id="status" class="waiting">⏳ Waiting...</div>
</div>

<!-- Details -->
<div style="display:flex;flex-direction:column;gap:30px;">

<div class="card">
  <div class="card-title">Student Details</div>

  <div class="row"><span class="label">GR No</span><span id="gr" class="value">-</span></div>
  <div class="row"><span class="label">Name</span><span id="name" class="value">-</span></div>
  <div class="row"><span class="label">Department</span><span id="dept" class="value">-</span></div>
  <div class="row"><span class="label">Year</span><span id="year" class="value">-</span></div>
  <div class="row"><span class="label">Route</span><span id="route" class="value">-</span></div>
  <div class="row"><span class="label">Similarity</span><span id="sim" class="value">-</span></div>
  <div class="row"><span class="label">Time</span><span id="time" class="value">-</span></div>
</div>

<div class="card">
  <div class="card-title">Recent Attempts</div>
  <div id="history" class="history"></div>
</div>

</div>
</main>

<script>

// Clock
function updateClock(){
  const now=new Date();
  document.getElementById("clock").innerText=
  now.toLocaleDateString("en-IN")+" "+
  now.toLocaleTimeString("en-IN");
}
setInterval(updateClock,1000);
updateClock();

// Poll server
const historyDiv=document.getElementById("history");
let history=[];

async function fetchStatus(){
  try{
    const res=await fetch("/upload_status");
    const data=await res.json();
    updateUI(data);
  }catch(e){}
  
  document.getElementById("camera").src="/static/latest.jpg?t="+Date.now();
}

function updateUI(data){

  const status=data.status||"waiting";
  const badge=document.getElementById("status");
  const cam=document.getElementById("camera");

  const labels={
    valid:"✅ BUS ACCESS GRANTED",
    fee_unpaid:"⚠ BUS FEE UNPAID",
    invalid_person:"❌ INVALID PERSON",
    invalid_database:"⚠ NOT IN DATABASE",
    error:"🔴 SERVER ERROR",
    waiting:"⏳ Waiting..."
  };

  badge.innerText=labels[status]||status;
  badge.className=status;
  cam.className=status;

  const det=data.details||{};

  document.getElementById("gr").innerText=data.gr_no||"-";
  document.getElementById("name").innerText=det.name||"-";
  document.getElementById("dept").innerText=det.department||"-";
  document.getElementById("year").innerText=det.year||"-";
  document.getElementById("route").innerText=det.route||"-";
  document.getElementById("sim").innerText=data.similarity?data.similarity.toFixed(3):"-";
  document.getElementById("time").innerText=data.timestamp||"-";

  if(status!=="waiting"){
    history.unshift({status:status,gr:data.gr_no||"unknown"});
    if(history.length>20)history.pop();
    renderHistory();
  }
}

function renderHistory(){
  historyDiv.innerHTML=history.map(h=>
    `<div><span class="dot ${h.status}"></span>${h.gr} - ${h.status}</div>`
  ).join("");
}

setInterval(fetchStatus,3000);
fetchStatus();

</script>
</body>
</html>
